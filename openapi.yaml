openapi: 3.1.0

info:
  title: ITX API
  version: 0.1.0
  description: Shared API spec implemented by every backend (Go, Rust, ...).

servers:
  - url: http://localhost:8080

paths:
  /api/v1/users/me:
    get:
      summary: Get current user (upserts on first call)
      operationId: getMe
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxUserEmail"
        - $ref: "#/components/parameters/ItxRequestId"
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "5XX":
          $ref: "#/components/responses/ServerError"
  /api/v1/subscriptions/{author_id}:
    parameters:
      - name: author_id
        in: path
        required: true
        description: The author the caller wants to subscribe to or unsubscribe from.
        schema:
          type: string
          format: uuid
    put:
      summary: Subscribe to an author (idempotent)
      operationId: subscribe
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxUserEmail"
        - $ref: "#/components/parameters/ItxRequestId"
      responses:
        "204":
          description: Subscription created (or already existed)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "5XX":
          $ref: "#/components/responses/ServerError"
    delete:
      summary: Unsubscribe from an author (idempotent)
      operationId: unsubscribe
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxRequestId"
      responses:
        "204":
          description: Subscription removed (or did not exist)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "5XX":
          $ref: "#/components/responses/ServerError"
  /api/v1/users/{id}/subscriptions:
    parameters:
      - name: id
        in: path
        required: true
        description: The user whose outgoing subscriptions to list.
        schema:
          type: string
          format: uuid
    get:
      summary: List the authors that user {id} subscribes to
      operationId: listSubscriptions
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxRequestId"
      responses:
        "200":
          description: The list of authors that {id} subscribes to
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubscriptionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "5XX":
          $ref: "#/components/responses/ServerError"
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                data:
                  status: ok
  /api/v1/posts:
    get:
      summary: List posts
      operationId: listPosts
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxRequestId"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Posts owned by the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPostsResponse"
              example:
                data:
                  items: []
        "401":
          $ref: "#/components/responses/Unauthorized"
        "5XX":
          $ref: "#/components/responses/ServerError"
    post:
      summary: Create post
      operationId: createPost
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "5XX":
          $ref: "#/components/responses/ServerError"
  /api/v1/posts/{id}:
    parameters:
      - $ref: "#/components/parameters/PostId"
    get:
      summary: Get post
      operationId: getPost
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxRequestId"
      responses:
        "200":
          description: The requested post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "5XX":
          $ref: "#/components/responses/ServerError"
    patch:
      summary: Update post
      operationId: updatePost
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostRequest"
      responses:
        "200":
          description: The updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "5XX":
          $ref: "#/components/responses/ServerError"
    delete:
      summary: Delete post
      operationId: deletePost
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxRequestId"
      responses:
        "204":
          description: Post deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "5XX":
          $ref: "#/components/responses/ServerError"
components:
  parameters:
    ItxUserId:
      name: X-Itx-User-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    ItxRequestId:
      name: X-Itx-Request-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
    ItxUserEmail:
      name: X-Itx-User-Email
      in: header
      required: true
      schema:
        type: string
        format: email
    PostId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    Unauthorized:
      description: Caller is not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              message: Unauthorized
    NotFound:
      description: Post not found or not owned by the caller
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [ok]
    ListPostsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Post"
    PostResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Post"
    Post:
      type: object
      required: [id, authorId, title, body, tags, createdAt]
      properties:
        id:
          type: integer
          format: int64
        authorId:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    CreatePostRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string
    UpdatePostRequest:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string
    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/User"
    ListSubscriptionsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/User"
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
