openapi: 3.1.0

info:
  title: ITX API
  version: 0.1.0
  description: Shared API spec implemented by every backend (Go, Rust, ...).

servers:
  - url: http://localhost:8080

paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                data:
                  status: ok
components:
  schemas:
    HealthResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [ok]
