openapi: 3.1.0

info:
  title: ITX API
  version: 0.1.0
  description: Shared API spec implemented by every backend (Go, Rust, ...).

servers:
  - url: http://localhost:8080

paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                data:
                  status: ok
  /api/v1/posts:
    get:
      summary: List posts
      operationId: listPosts
      parameters:
        - $ref: "#/components/parameters/ItxUserId"
        - $ref: "#/components/parameters/ItxRequestId"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Posts owned by the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPostsResponse"
              example:
                data:
                  items: []
        "401":
          description: Caller is not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  message: Unauthorized
        "5XX":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    ItxUserId:
      name: X-Itx-User-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    ItxRequestId:
      name: X-Itx-Request-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
  schemas:
    HealthResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [ok]
    ListPostsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Post"
    Post:
      type: object
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
