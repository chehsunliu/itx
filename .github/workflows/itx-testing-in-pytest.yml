name: ITX Testing in Pytest

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rust-integration-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-tests/pytest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: uv sync

      - name: Check formatting
        run: make check

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set Rust caching env vars
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Build binaries
        working-directory: itx-rs
        run: cargo build

      - name: Run integration tests
        timeout-minutes: 5
        run: uv run pytest --durations=50

  golang-integration-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-tests/pytest
    env:
      ITX_LANG: golang
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: uv sync

      - name: Check formatting
        run: make check

      - uses: actions/setup-go@v6
        with:
          go-version-file: itx-go/itx-backend/go.mod
          cache-dependency-path: itx-go/itx-backend/go.sum

      - name: Build binaries
        working-directory: itx-go
        run: make build

      - name: Run integration tests
        timeout-minutes: 5
        run: uv run pytest --durations=50
